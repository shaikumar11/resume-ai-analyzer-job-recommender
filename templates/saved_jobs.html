<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saved Jobs · Resume IQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF9F5; --panel:#FFFFFF; --panel-2:#F4F2EC; --border:#E7E3D8;
    --text:#18151F; --muted:#6E6A78; --muted-2:#9B96A3;
    --primary:#5B4FE8; --primary-ink:#FFFFFF; --primary-soft:#EFEDFF;
    --spark:#E8672C; --spark-soft:#FDEBE0;
    --amber:#9A6B12; --amber-soft:#FBF0DA;
    --green:#0E7C56; --green-soft:#E1F5EC;
    --red:#B93A32; --red-soft:#FBEAE7;
    --shadow:0 1px 2px rgba(24,21,31,.04), 0 1px 3px rgba(24,21,31,.06);
    --serif:'Fraunces',serif; --display:'Plus Jakarta Sans',sans-serif; --body:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
    --radius:14px;
  }
  [data-theme="dark"]{
    --bg:#121016; --panel:#1A1820; --panel-2:#211E28; --border:#302C3A;
    --text:#F3F1F6; --muted:#A29CAF; --muted-2:#716C80;
    --primary:#8478FF; --primary-ink:#121016; --primary-soft:#28234A;
    --spark:#FF8F5C; --spark-soft:#3A2618;
    --amber:#E3B95C; --amber-soft:#2E2712;
    --green:#4FCB9B; --green-soft:#12291F;
    --red:#F0776E; --red-soft:#2E1917;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--body);transition:background .25s,color .25s;}
  a{color:inherit;text-decoration:none;}
  :focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:6px;}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes popIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
  .anim-fade-up{animation:fadeInUp .5s cubic-bezier(.22,.9,.35,1) both;}

  .navbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
  .navbar-left{display:flex;align-items:center;gap:36px;}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:800;font-size:17px;letter-spacing:-.01em;}
  .brand-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--spark));display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--display);font-weight:800;font-size:14px;}
  .nav-links{display:flex;align-items:center;gap:26px;}
  .nav-link{display:flex;align-items:center;gap:7px;font-family:var(--display);font-weight:600;font-size:13.5px;color:var(--muted);padding-bottom:4px;border-bottom:2px solid transparent;cursor:pointer;}
  .nav-link svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;}
  .nav-link:hover{color:var(--text);}
  .nav-link.active{color:var(--primary);border-bottom-color:var(--primary);}
  .navbar-right{display:flex;align-items:center;gap:14px;position:relative;}
  .theme-toggle,.notif-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--panel-2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);}
  .theme-toggle:hover,.notif-btn:hover{color:var(--primary);border-color:var(--primary);}
  .theme-toggle svg,.notif-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;}
  .notif-btn{position:relative;}
  .notif-dot{position:absolute;top:6px;right:7px;width:8px;height:8px;border-radius:50%;background:var(--spark);border:2px solid var(--panel);}
  .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--spark));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:13px;overflow:hidden;}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  @media (max-width:900px){.nav-links{display:none;}}
  .notif-panel{position:absolute;top:60px;right:96px;width:320px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);z-index:30;display:none;overflow:hidden;}
  .notif-panel.open{display:block;animation:popIn .18s cubic-bezier(.22,.9,.35,1) both;}
  .notif-panel-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);font-family:var(--display);font-weight:700;font-size:13px;}
  .notif-mark-all{font-size:11.5px;color:var(--primary);cursor:pointer;font-weight:600;}
  .notif-list{max-height:320px;overflow-y:auto;}
  .notif-item{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12.5px;cursor:pointer;}
  .notif-item:hover{background:var(--panel-2);}
  .notif-item.unread{background:var(--primary-soft);}
  .notif-item b{display:block;font-size:12.5px;margin-bottom:2px;}
  .notif-item span{color:var(--muted);font-size:11.5px;}
  .notif-empty{padding:26px 14px;text-align:center;color:var(--muted-2);font-size:12.5px;}

  .page{max-width:980px;margin:0 auto;padding:32px 28px 60px;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;gap:16px;flex-wrap:wrap;}
  .page-head h1{font-family:var(--serif);font-size:28px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em;}
  .page-head p{margin:0;color:var(--muted);font-size:14px;}
  .search-box{position:relative;}
  .search-box input{width:240px;padding:10px 12px 10px 34px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:13px;font-family:var(--body);outline:none;}
  .search-box input:focus{border-color:var(--primary);}
  .search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:1.8;}

  .job-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:16px;box-shadow:var(--shadow);}
  .job-left{display:flex;gap:14px;min-width:0;}
  .logo{width:42px;height:42px;border-radius:10px;background:var(--panel-2);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:15px;color:var(--primary);flex-shrink:0;}
  .job-text b{display:block;font-size:14.5px;font-weight:700;}
  .job-text .company{font-size:13px;color:var(--muted);margin:2px 0;}
  .job-text .meta{font-size:11.5px;color:var(--muted-2);}
  .job-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .score-badge{font-family:var(--mono);font-weight:600;font-size:12.5px;padding:5px 10px;border-radius:7px;background:var(--green-soft);color:var(--green);}
  .apply-btn{padding:9px 16px;border-radius:9px;background:var(--primary);color:var(--primary-ink);font-family:var(--display);font-weight:700;font-size:12.5px;white-space:nowrap;}
  .icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--panel-2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);flex-shrink:0;}
  .icon-btn:hover{color:var(--red);border-color:var(--red);}
  .icon-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;}

  @media (max-width:640px){
    .job-card{flex-direction:column;align-items:flex-start;}
    .job-right{width:100%;justify-content:space-between;}
  }

  .empty-state{text-align:center;padding:70px 20px;color:var(--muted-2);}
  .empty-state svg{width:44px;height:44px;stroke:var(--muted-2);fill:none;stroke-width:1.4;margin-bottom:12px;}
  .empty-state b{display:block;color:var(--text);font-family:var(--display);font-size:15px;margin-bottom:5px;}
  .cta-btn{display:inline-flex;align-items:center;gap:7px;margin-top:14px;padding:10px 18px;border-radius:10px;background:var(--primary);color:var(--primary-ink);font-family:var(--display);font-weight:700;font-size:13.5px;}

  .skel{background:linear-gradient(90deg,var(--panel-2) 25%,var(--border) 37%,var(--panel-2) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite;border-radius:var(--radius);}
  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}

  .toast-stack{position:fixed;bottom:22px;right:22px;z-index:100;display:flex;flex-direction:column;gap:10px;}
  .toast{background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:11px;padding:12px 16px;font-size:13px;font-weight:600;animation:fadeInUp .25s cubic-bezier(.22,.9,.35,1) both;}
  .toast.error{color:var(--red);border-color:var(--red-soft);}
  .toast.success{color:var(--green);border-color:var(--green-soft);}
</style>
</head>
<body>

<div class="navbar">
  <div class="navbar-left">
    <a href="{{ url_for('resume.index') }}" class="brand"><div class="brand-mark">IQ</div>Resume IQ</a>
    <div class="nav-links">
      <a href="{{ url_for('resume.index') }}" class="nav-link"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Home</a>
      <a href="{{ url_for('dashboard.dashboard_page') }}" class="nav-link"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>Dashboard</a>
      <a href="{{ url_for('resume.history_page') }}" class="nav-link"><svg viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h18"/></svg>History</a>
      <a href="{{ url_for('jobs.saved_jobs_page') }}" class="nav-link active"><svg viewBox="0 0 24 24"><path d="M19 21l-7-4-7 4V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>Saved Jobs</a>
      <a href="{{ url_for('profile.profile_page') }}" class="nav-link"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Profile</a>
    </div>
  </div>
  <div class="navbar-right">
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <button class="notif-btn" id="notifBtn" title="Notifications">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span class="notif-dot" id="notifDot" style="display:none;"></span>
    </button>
    <a href="{{ url_for('auth.logout') }}" class="nav-link" title="Sign out" style="border-bottom:none;">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    </a>
    <div class="avatar">{{ user.full_name[0]|upper if user and user.full_name else 'U' }}</div>
    <div class="notif-panel" id="notifPanel">
      <div class="notif-panel-head">Notifications <span class="notif-mark-all" id="markAllRead">Mark all read</span></div>
      <div id="notifList" class="notif-list"><div class="notif-empty">No notifications yet.</div></div>
    </div>
  </div>
</div>

<div class="page">
  <div class="page-head anim-fade-up">
    <div>
      <h1>Saved Jobs</h1>
      <p>Roles you've bookmarked to apply to later.</p>
    </div>
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search saved jobs...">
    </div>
  </div>

  <div id="jobsList">
    <div class="skel" style="height:80px;margin-bottom:12px;"></div>
    <div class="skel" style="height:80px;margin-bottom:12px;"></div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script>
const root = document.documentElement;
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
function applyTheme(mode){
  root.setAttribute('data-theme', mode);
  localStorage.setItem('rm-theme', mode);
  themeIcon.innerHTML = mode === 'dark'
    ? '<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>'
    : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
}
applyTheme(localStorage.getItem('rm-theme') || 'light');
themeToggle.addEventListener('click', () => applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

function showToast(message, type='success'){
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = message;
  stack.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

const notifBtn = document.getElementById('notifBtn');
const notifPanel = document.getElementById('notifPanel');
const notifDot = document.getElementById('notifDot');
const notifList = document.getElementById('notifList');
async function loadNotifications(){
  try{
    const res = await fetch('/api/notifications');
    if(!res.ok) return;
    const data = await res.json();
    notifDot.style.display = data.unread_count > 0 ? 'block' : 'none';
    notifList.innerHTML = data.notifications.length
      ? data.notifications.map(n => `<div class="notif-item ${n.is_read ? '' : 'unread'}" data-id="${n.id}"><b>${escapeHtml(n.title)}</b><span>${escapeHtml(n.message||'')}</span></div>`).join('')
      : '<div class="notif-empty">No notifications yet.</div>';
    notifList.querySelectorAll('.notif-item').forEach(item => {
      item.addEventListener('click', async () => { await fetch(`/api/notifications/${item.dataset.id}/read`, {method:'POST'}); loadNotifications(); });
    });
  }catch(e){}
}
notifBtn.addEventListener('click', () => notifPanel.classList.toggle('open'));
document.getElementById('markAllRead').addEventListener('click', async (e) => { e.stopPropagation(); await fetch('/api/notifications/read-all', {method:'POST'}); loadNotifications(); });
document.addEventListener('click', (e) => { if(!notifPanel.contains(e.target) && !notifBtn.contains(e.target)) notifPanel.classList.remove('open'); });

function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

let currentQuery = '';
const listEl = document.getElementById('jobsList');

async function loadSavedJobs(q=''){
  try{
    const url = q ? `/api/jobs/saved?q=${encodeURIComponent(q)}` : '/api/jobs/saved';
    const res = await fetch(url);
    if(!res.ok) throw new Error('failed');
    const jobs = await res.json();
    renderJobs(jobs);
  }catch(e){
    listEl.innerHTML = `<div class="empty-state"><b>Couldn't load saved jobs</b><span>Please refresh to try again.</span></div>`;
    showToast('Failed to load saved jobs', 'error');
  }
}

function renderJobs(jobs){
  if(!jobs.length){
    listEl.innerHTML = `
      <div class="empty-state anim-fade-up">
        <svg viewBox="0 0 24 24"><path d="M19 21l-7-4-7 4V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        <b>${currentQuery ? 'No matches found' : 'No saved jobs yet'}</b>
        <span>${currentQuery ? 'Try a different search term.' : "Jobs you save from the Home page will show up here."}</span>
        ${currentQuery ? '' : `<div><a href="{{ url_for('resume.index') }}" class="cta-btn">Find jobs to save</a></div>`}
      </div>`;
    return;
  }

  listEl.innerHTML = jobs.map(j => `
    <div class="job-card anim-fade-up" data-key="${escapeHtml(j.job_key)}">
      <div class="job-left">
        <div class="logo">${escapeHtml((j.job_company || '?').charAt(0).toUpperCase())}</div>
        <div class="job-text">
          <b>${escapeHtml(j.job_title)}</b>
          <div class="company">${escapeHtml(j.job_company || 'Unknown Company')}</div>
          <div class="meta">${escapeHtml(j.job_location || '')} ${j.source ? '&middot; ' + escapeHtml(j.source) : ''}</div>
        </div>
      </div>
      <div class="job-right">
        ${j.ats_score != null ? `<div class="score-badge">${j.ats_score}% ATS</div>` : ''}
        <a href="${escapeHtml(j.apply_url || '#')}" target="_blank" rel="noopener" class="apply-btn">Apply</a>
        <button class="icon-btn" title="Remove" data-remove="${escapeHtml(j.job_key)}">
          <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/></svg>
        </button>
      </div>
    </div>
  `).join('');

  listEl.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => removeSavedJob(btn.dataset.remove));
  });
}

async function removeSavedJob(jobKey){
  try{
    const res = await fetch(`/api/jobs/save/${encodeURIComponent(jobKey)}`, { method: 'DELETE' });
    if(!res.ok) throw new Error('failed');
    document.querySelector(`.job-card[data-key="${CSS.escape(jobKey)}"]`)?.remove();
    if(!listEl.children.length) loadSavedJobs(currentQuery);
    showToast('Removed from saved jobs');
  }catch(e){
    showToast('Failed to remove job', 'error');
  }
}

let searchTimer;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  currentQuery = e.target.value.trim();
  searchTimer = setTimeout(() => loadSavedJobs(currentQuery), 250);
});

loadSavedJobs();
loadNotifications();
</script>
</body>
</html>

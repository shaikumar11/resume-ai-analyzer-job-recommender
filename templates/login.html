<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign In · Resume IQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF9F5; --panel:#FFFFFF; --panel-2:#F4F2EC; --border:#E7E3D8;
    --text:#18151F; --muted:#6E6A78; --muted-2:#9B96A3;
    --primary:#5B4FE8; --primary-ink:#FFFFFF; --primary-soft:#EFEDFF;
    --spark:#E8672C;
    --red:#B93A32; --red-soft:#FBEAE7;
    --shadow:0 1px 2px rgba(24,21,31,.04), 0 8px 24px rgba(24,21,31,.07);
    --serif:'Fraunces',serif; --display:'Plus Jakarta Sans',sans-serif; --body:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
    --radius:14px;
  }
  [data-theme="dark"]{
    --bg:#121016; --panel:#1A1820; --panel-2:#211E28; --border:#302C3A;
    --text:#F3F1F6; --muted:#A29CAF; --muted-2:#716C80;
    --primary:#8478FF; --primary-ink:#121016; --primary-soft:#28234A;
    --spark:#FF8F5C;
    --red:#F0776E; --red-soft:#2E1917;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--body);
       display:flex;align-items:center;justify-content:center;padding:24px;transition:background .2s,color .2s;}

  .theme-toggle{position:fixed;top:20px;right:20px;width:38px;height:38px;border-radius:10px;
    border:1px solid var(--border);background:var(--panel);display:flex;align-items:center;
    justify-content:center;cursor:pointer;color:var(--muted);}
  .theme-toggle svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;}

  .auth-card{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--border);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:36px 32px;}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:800;
    font-size:16px;margin-bottom:26px;}
  .brand-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--spark));
    display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--display);
    font-weight:800;font-size:14px;flex-shrink:0;}

  h1{font-family:var(--serif);font-size:26px;font-weight:600;margin:0 0 6px;letter-spacing:-.01em;}
  .sub{margin:0 0 26px;color:var(--muted);font-size:13.5px;}

  .error-box{background:var(--red-soft);color:var(--red);padding:10px 14px;border-radius:9px;
    font-size:13px;font-family:var(--mono);margin-bottom:18px;}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .field input{width:100%;background:var(--panel-2);border:1px solid var(--border);border-radius:10px;
    padding:12px 14px;font-size:14px;color:var(--text);font-family:var(--body);outline:none;}
  .field input:focus{border-color:var(--primary);}

  .submit-btn{width:100%;padding:13px;border:none;border-radius:10px;background:var(--primary);
    color:var(--primary-ink);font-family:var(--display);font-weight:700;font-size:14.5px;cursor:pointer;
    margin-top:6px;}
  .submit-btn:hover{opacity:.92;}

  .switch-line{text-align:center;margin-top:22px;font-size:13.5px;color:var(--muted);}
  .switch-line a{color:var(--primary);font-weight:600;text-decoration:none;}
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" title="Toggle theme">
  <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
</button>

<div class="auth-card">
  <div class="brand"><div class="brand-mark">IQ</div>Resume IQ</div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to score your resume against live openings.</p>

  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('auth.login') }}">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="submit-btn">Sign In</button>
  </form>

  <p class="switch-line">Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a></p>
</div>

<script>
  const root = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  const themeIcon = document.getElementById('themeIcon');
  function applyTheme(mode){
    root.setAttribute('data-theme', mode);
    localStorage.setItem('rm-theme', mode);
    themeIcon.innerHTML = mode === 'dark'
      ? '<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>'
      : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  }
  applyTheme(localStorage.getItem('rm-theme') || 'light');
  themeToggle.addEventListener('click', () => {
    applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
</script>
</body>
</html>
